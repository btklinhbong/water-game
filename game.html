<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    The <meta charset="UTF-8"> tag tells the browser what text encoding to use.
    UTF-8 supports most characters used around the world.
  -->
  <meta charset="UTF-8">

  <!--
    This makes the layout scale correctly on phones and tablets.
    Without this, mobile pages often appear zoomed out.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--
    <title> sets the text shown on the browser tab.
  -->
  <title>Water Game</title>

  <!--
    This links the external CSS file.
    CSS is where we define colors, spacing, sizes, alignment, etc.
  -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--
    ===== Quick beginner note: How HTML + CSS work together =====

    HTML gives structure (what things ARE):
    - headings, paragraphs, buttons, containers

    CSS gives style (how things LOOK):
    - colors, fonts, spacing, positions, borders

    A "class" (example: class="scenario-card") is a label attached to an HTML element.
    In CSS, a class is selected with a dot (example: .scenario-card { ... }).
    That style is then applied to every HTML element that has that class.
  -->

  <!--
    This top bar holds the four stats labels:
    Health, Hydration, Sanity, GPA.
  -->
  <div class="stats-bar">
    <!--
      <div> is a generic container block.
      It does not have special meaning by itself.
      We use it to group content so CSS can style/layout it.
    -->
    <!--
      Each stat-item now holds a label and a progress bar track.
      The inner .stat-bar-fill div is what JavaScript will resize via style.width.
    -->
    <div class="stat-item">
      <span class="stat-label">Health</span>
      <div class="stat-bar-track">
        <div id="health-bar" class="stat-bar-fill health-bar"></div>
      </div>
    </div>
    <div class="stat-item">
      <span class="stat-label">Hydration</span>
      <div class="stat-bar-track">
        <div id="hydration-bar" class="stat-bar-fill hydration-bar"></div>
      </div>
    </div>
    <div class="stat-item">
      <span class="stat-label">Sanity</span>
      <div class="stat-bar-track">
        <div id="sanity-bar" class="stat-bar-fill sanity-bar"></div>
      </div>
    </div>
    <div class="stat-item">
      <span class="stat-label">GPA</span>
      <div class="stat-bar-track">
        <div id="gpa-bar" class="stat-bar-fill gpa-bar"></div>
      </div>
    </div>
  </div>

  <!--
    Main play area. We center the card and buttons here.
  -->
  <main class="game-area">

    <!--
      Scenario card container.
      This is the central card requested.
    -->
    <div class="scenario-card">

      <!--
        <h1> is a top-level heading.
        It usually represents the most important heading in a section/page.
        Browsers and screen readers treat headings as important structure.
      -->
      <h1 class="scenario-title">A Difficult Choice</h1>

      <!--
        <p> is a paragraph tag used for normal text content.
      -->
      <p class="scenario-text">
        You have one bottle of clean water left and exams tomorrow.
        Do you save the water for later, or drink now to think clearly?
      </p>
    </div>

    <!--
      Button row directly below the card.
    -->
    <div class="options-row">

      <!--
        <button> creates a clickable button.
        Right now, these are only visual (no JavaScript yet).
        Later, JavaScript can detect clicks and update stats/game state.
      -->
      <button id="option-a-button" class="option-button">Option A</button>
      <button id="option-b-button" class="option-button">Option B</button>
    </div>
  </main>

  <!-- Fade-to-black overlay that appears when game ends -->
  <div id="fade-overlay" class="fade-overlay"></div>

  <div id="end-game-modal" class="end-game-modal">
    <div class="end-game-content">
      <h2 id="end-game-title">Game Over</h2>
      <p id="end-game-description"></p>
      <button id="play-again-button" class="option-button">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
